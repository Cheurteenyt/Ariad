# R168.3a — Docker smoke test
# Tests that docker build --no-cache produces a working image
# with CLI, non-root user, and UI assets.

name: Docker Smoke

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'v2/package.json'
      - 'v2/package-lock.json'
      - 'graph-ui/package.json'
      - 'graph-ui/package-lock.json'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  docker-smoke:
    name: Docker build + CLI + non-root smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Build Docker image (no cache)
        run: |
          docker build --no-cache -t cbm-v2:test .

      - name: CLI version
        run: |
          docker run --rm cbm-v2:test --version

      - name: CLI help
        run: |
          docker run --rm cbm-v2:test --help

      - name: Non-root user check
        run: |
          UID=$(docker run --rm cbm-v2:test sh -c 'id -u')
          echo "Container runs as UID: $UID"
          test "$UID" = "1000"

      - name: Cache directory writable
        run: |
          docker run --rm cbm-v2:test sh -c 'mkdir -p /home/cbm/.cache/codebase-memory-mcp && touch /home/cbm/.cache/codebase-memory-mcp/test && echo "Cache writable"'

      - name: UI assets present
        run: |
          docker run --rm cbm-v2:test sh -c 'test -f /app/dist/ui/index.html && echo "UI index.html present"'
