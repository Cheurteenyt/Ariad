# GitHub Actions Quota Report — scheduled/manual workflow
#
# R112: split from ci.yml to fix false "1 error" annotation on push/PR pipelines.
# Previously, quota-report lived in ci.yml with `if: github.event_name == 'schedule'`,
# which caused it to be SKIPPED on every push/PR. GitHub Actions reports skipped
# jobs as "1 error" in annotations, making the pipeline look failed even when
# backend/frontend passed.
#
# Now this workflow triggers on schedule (weekly Monday 00:00 UTC) or manually.
# Push/PR pipelines run the four always-on jobs in ci.yml — no skipped jobs.
#
# R50: original quota-report job
# R52: security hardening, single API call + single parse
# R55 (D3): job-level permissions: actions: read for /actions/runs API
# R55 (D5): schedule-only (removed push trigger to reduce noise)
# R112: moved to separate workflow file to fix skipped-job false error

name: Quota Report

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly Monday 00:00 UTC
  workflow_dispatch: {}  # Allow manual trigger

permissions:
  contents: read
  actions: read

jobs:
  quota-report:
    name: Quota Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate repository health report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "## Repository Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # GitHub API rate limits — fail on HTTP error (R168.2 fix)
          RATE_LIMIT=$(curl --fail-with-body --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit")

          echo "$RATE_LIMIT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          core = d['resources']['core']
          search = d['resources']['search']
          print('### GitHub API Rate Limits')
          print()
          print('| Resource | Remaining | Limit |')
          print('|----------|-----------|-------|')
          print(f'| Core API | {core[\"remaining\"]} | {core[\"limit\"]} |')
          print(f'| Search API | {search[\"remaining\"]} | {search[\"limit\"]} |')
          print()
          " >> $GITHUB_STEP_SUMMARY

          # Actions runs count — fail on HTTP error (R168.2 fix)
          # Note: this is the total count of all workflow runs visible to
          # the API, NOT filtered to the last 30 days. The GitHub API
          # does not support date filtering on this endpoint.
          RUNS_RESPONSE=$(curl --fail-with-body --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=1")

          TOTAL_RUNS=$(echo "$RUNS_RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'total_count' not in d:
              print('ERROR: missing total_count', file=sys.stderr)
              sys.exit(1)
          print(d['total_count'])
          ")

          echo "### GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| All workflow runs (visible to API) | $TOTAL_RUNS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Standard GitHub-hosted runners are free for public repositories." >> $GITHUB_STEP_SUMMARY
          echo "> This report does not assert absence of technical or service limits." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Actions: free for public repos (standard runners)" >> $GITHUB_STEP_SUMMARY
          echo "- GitLab CI: disabled; passive mirror creates no pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub API: 5000 req/hr (authenticated)" >> $GITHUB_STEP_SUMMARY
