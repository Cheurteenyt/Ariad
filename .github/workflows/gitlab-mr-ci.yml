# R156 (CI-FLOW-R156-01): GitLab MR CI gate.
name: GitLab MR CI

run-name: >-
  GitLab MR !${{ github.event.client_payload.mr_iid }}
  @ ${{ github.event.client_payload.sha }}

on:
  repository_dispatch:
    types: [gitlab-mr-ci]

permissions:
  contents: read

concurrency:
  group: gitlab-mr-${{ github.event.client_payload.mr_iid }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate payload
        shell: bash
        env:
          SHA: ${{ github.event.client_payload.sha }}
          MR_IID: ${{ github.event.client_payload.mr_iid }}
        run: |
          set -euo pipefail
          [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$MR_IID" =~ ^[0-9]+$ ]]

  backend:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: v2/package.json
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npx vitest run

  frontend:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: graph-ui
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: graph-ui/package.json
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npx vitest run
