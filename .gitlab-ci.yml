# GitLab CI — lightweight mirror to GitHub (CI runs on GitHub Actions)
#
# R50: added scheduled quota-check job that uses the automatic CI_JOB_TOKEN
# R52: fixed BusyBox date compatibility, simplified script, added error handling.
# R54: added workflow:rules + mr-preflight so MR pipelines PASS (not skip).
#      Without this, "Pipelines must succeed" blocks MRs because all jobs
#      are filtered out by `if: $CI_COMMIT_BRANCH == "main"` (CI_COMMIT_BRANCH
#      is undefined for merge_request_event pipelines).
# R54b: switched all script blocks to block scalars (|). YAML was parsing
#       lines containing `: ` (e.g. "Source branch: $VAR") as mappings
#       instead of strings, which fails GitLab's CI validation:
#       "script config should be a string or a nested array of strings".

# R54: workflow:rules controls WHEN a pipeline is created at all.
# - merge_request_event: MR pipelines (must have at least one passing job)
# - push to main: mirror + quota-check
# - schedule: quota-check only
# - All other events (push to feature branches, tags, web): no pipeline
#   (those branches don't need GitLab CI — GitHub Actions handles them).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - preflight
  - mirror
  - report

# ── MR CI gate (R156) ────────────────────────────────────────────
# R156 (CI-FLOW-R156-01): Replaced the fake mr-preflight (echo only) with a
# real CI gate. This job pushes the MR's SHA to a temporary GitHub branch,
# triggers the `gitlab-mr-ci` workflow via repository_dispatch, and waits for
# the result.
#
# TRANSITIONAL (R156): allow_failure: true because the `gitlab-mr-ci.yml`
# workflow doesn't exist on GitHub main yet (it's in this MR). Once this MR
# merges and mirrors to GitHub, the workflow will be on main, and a follow-up
# commit will remove allow_failure.
#
# Required CI/CD variables:
#   - GITHUB_MIRROR_TOKEN (PAT with repo access, used for push + dispatch)
github-ci-gate:
  stage: preflight
  image: alpine:latest
  allow_failure: true
  before_script:
    - apk add --no-cache git curl python3
  script:
    - |
      set -euo pipefail

      GH_REPO="Cheurteenyt/codebase-mirror"
      TEMP_BRANCH="gitlab-ci/mr-$CI_MERGE_REQUEST_IID"
      GH_URL="https://github.com/$GH_REPO.git"

      AUTH=$(printf '%s' "Cheurteenyt:${GITHUB_MIRROR_TOKEN}" | base64 -w0)

      # Check if the gitlab-mr-ci workflow exists on GitHub main.
      WORKFLOW_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
        --header "Authorization: Bearer $GITHUB_MIRROR_TOKEN" \
        --header "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/$GH_REPO/contents/.github/workflows/gitlab-mr-ci.yml?ref=main")

      if [ "$WORKFLOW_CHECK" != "200" ]; then
        echo "⚠ WARNING: .github/workflows/gitlab-mr-ci.yml not found on GitHub main."
        echo "  The CI gate workflow is not yet deployed (transitional R156 MR)."
        echo "  This MR will be allowed to merge (allow_failure: true)."
        echo "  After merge, the workflow will be on main and the gate will activate."
        echo "  A follow-up commit should remove allow_failure: true."
        exit 0
      fi

      echo "✓ gitlab-mr-ci.yml exists on GitHub main. Running CI gate..."

      git -c http.extraHeader="Authorization: basic $AUTH" \
        push "$GH_URL" \
        "$CI_COMMIT_SHA:refs/heads/$TEMP_BRANCH" \
        --force

      curl --fail-with-body \
        --request POST \
        --header "Accept: application/vnd.github+json" \
        --header "Authorization: Bearer $GITHUB_MIRROR_TOKEN" \
        --header "X-GitHub-Api-Version: 2022-11-28" \
        --data "{
          \"event_type\":\"gitlab-mr-ci\",
          \"client_payload\":{
            \"sha\":\"$CI_COMMIT_SHA\",
            \"mr_iid\":\"$CI_MERGE_REQUEST_IID\",
            \"branch\":\"$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME\"
          }
        }" \
        "https://api.github.com/repos/$GH_REPO/dispatches"

      echo "Waiting for GitHub CI to complete..."
      echo "Check: https://github.com/$GH_REPO/actions"

      MAX_WAIT=900
      ELAPSED=0
      CONCLUSION=""

      while [ $ELAPSED -lt $MAX_WAIT ]; do
        sleep 30
        ELAPSED=$((ELAPSED + 30))

        RUN_JSON="$(
          curl -s \
            --header "Authorization: Bearer $GITHUB_MIRROR_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GH_REPO/actions/runs?event=repository_dispatch&per_page=5"
        )"

        CONCLUSION="$(
          printf '%s' "$RUN_JSON" |
          python3 -c "
import json, sys
data = json.load(sys.stdin)
for run in data.get('workflow_runs', []):
    if run.get('name', '').startswith('GitLab MR !$CI_MERGE_REQUEST_IID'):
        print(run.get('conclusion', ''))
        break
" 2>/dev/null || true
        )"

        if [ -n "$CONCLUSION" ]; then
          break
        fi

        echo "  Still waiting... (${ELAPSED}s elapsed)"
      done

      git -c http.extraHeader="Authorization: basic $AUTH" \
        push "$GH_URL" \
        --delete "$TEMP_BRANCH" 2>/dev/null || true

      if [ "$CONCLUSION" != "success" ]; then
        echo "GitHub CI failed or timed out. Conclusion: $CONCLUSION"
        echo "See: https://github.com/$GH_REPO/actions"
        exit 1
      fi

      echo "GitHub CI passed! MR is safe to merge."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Mirror to GitHub (on every main push) ────────────────────────
mirror-to-github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -euo pipefail
      echo "Mirroring to GitHub to trigger Actions CI..."
      # R53 (D1): --force-with-lease instead of --force, so a diverged GitHub
      # main (e.g. PR merged directly on GitHub) fails loudly instead of being
      # silently overwritten.
      # R53 (D2): http.extraHeader for auth — token never appears in URL or
      # git error output.
      # R54c: --force-with-lease without an expected SHA fails with "stale
      # info" on the 2nd+ mirror, because pushing to a bare URL doesn't
      # populate a remote-tracking ref. Fix: query GitHub's main SHA with
      # ls-remote first, then pass it explicitly as --force-with-lease=main:<sha>.
      GH_URL="https://github.com/Cheurteenyt/codebase-mirror.git"
      AUTH=$(printf '%s' "Cheurteenyt:${GITHUB_MIRROR_TOKEN}" | base64 -w0)
      # Fetch current GitHub main SHA (empty if first-time mirror).
      GH_MAIN=$(git -c http.extraHeader="Authorization: basic $AUTH" \
        ls-remote "$GH_URL" refs/heads/main 2>/dev/null | awk '{print $1}')
      if [ -z "$GH_MAIN" ]; then
        echo "First-time mirror — pushing with --force (no remote ref yet)."
        git -c http.extraHeader="Authorization: basic $AUTH" push "$GH_URL" HEAD:main --force
      else
        echo "GitHub main is at: $GH_MAIN"
        echo "Local  HEAD is at: $(git rev-parse HEAD)"
        # --force-with-lease=main:<sha> requires the remote ref to still be at <sha>.
        # If GitHub main moved (direct PR merge), this push fails loudly and the
        # CI job will be red — operator can investigate.
        git -c http.extraHeader="Authorization: basic $AUTH" push "$GH_URL" HEAD:main --force-with-lease=main:"$GH_MAIN"
      fi
      echo "Mirror complete. CI runs at https://github.com/Cheurteenyt/codebase-mirror/actions"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    GIT_STRATEGY: "clone"
    GIT_DEPTH: "0"

# ── Quota Report (weekly, R50/R52) ───────────────────────────────
# Uses CI_JOB_TOKEN (automatic, no configuration needed).
# R52: fixed date command for BusyBox (Alpine), single Python parse.
quota-check:
  stage: report
  image: alpine:latest
  before_script:
    - apk add --no-cache curl python3
  script:
    - |
      echo "=== GitLab CI Quota Report ==="
      echo ""
      # R52: BusyBox date doesn't support -d or -v. Use epoch math instead.
      THIRTY_DAYS_AGO=$(date -u -d '-30 days' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || python3 -c "import datetime; print((datetime.datetime.utcnow()-datetime.timedelta(days=30)).strftime('%Y-%m-%dT%H:%M:%SZ'))")
      PROJECT_INFO=$(curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID")
      echo "Project: $(echo $PROJECT_INFO | python3 -c 'import json,sys; print(json.load(sys.stdin).get("path_with_namespace","?"))')"
      echo ""
      echo "=== CI Minutes ==="
      SHARED_LIMIT=$(echo $PROJECT_INFO | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("shared_runners_minutes_limit","400 (free tier default)"))')
      echo "Shared runners limit: $SHARED_LIMIT min/month"
      echo ""
      echo "=== Pipeline Statistics ==="
      PIPELINES=$(curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/pipelines?per_page=100&updated_after=$THIRTY_DAYS_AGO")
      PIPELINE_COUNT=$(echo $PIPELINES | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d) if isinstance(d, list) else 0)')
      echo "Pipelines (last 30 days): $PIPELINE_COUNT"
      echo "Estimated CI usage: ~$((PIPELINE_COUNT * 5 / 60)) min ($PIPELINE_COUNT pipelines x ~5s each)"
      echo ""
      echo "=== Summary ==="
      echo "GitLab CI: ~$((PIPELINE_COUNT * 5 / 60)) min used / $SHARED_LIMIT min limit"
      echo "GitHub Actions: unlimited (public repo)"
      echo "All quotas healthy"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    GIT_STRATEGY: "none"
